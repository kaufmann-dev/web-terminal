<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Terminal</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="dark">
  <main class="login-container">
    <div class="login-card">
      <h1>Terminal Access</h1>
      <form id="login-form" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" autocomplete="username" required autofocus>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required>
        </div>
        <div class="error" id="error" role="alert" aria-live="polite"></div>
        <button type="submit" class="btn-primary" id="btn-submit">Log in</button>
      </form>
      <footer class="legal">
        <a href="https://legal.kaufmann.dev/privacy?site=terminal.kaufmann.dev" target="_blank" rel="noopener">Privacy</a>
        <span class="sep">·</span>
        <a href="https://legal.kaufmann.dev/privacy?site=terminal.kaufmann.dev" target="_blank" rel="noopener">Imprint</a>
      </footer>
    </div>
  </main>
  <script src="/static/js/login.js"></script>
</body>
</html>
