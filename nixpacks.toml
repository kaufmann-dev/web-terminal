[phases.setup]
nixPkgs = ["...", "ttyd", "tmux"]

[start]
cmd = 'app_root="$PWD"; workdir="${TERMINAL_WORKDIR:-/code}"; mkdir -p "$workdir" || exit 1; ttyd --interface 127.0.0.1 --port 7681 --base-path /ttyd --writable --url-arg /bin/bash "$app_root/scripts/attach-terminal-session.sh" & exec node app.js'
