set-option -g mouse on

bind-key -n WheelUpPane if-shell -F '#{==:#{@web-terminal-command},codex}' 'if-shell -F "#{==:#{@web-terminal-codex-transcript},1}" "select-pane; send-keys PageUp" "set-option -p @web-terminal-codex-transcript 1; select-pane; send-keys C-t PageUp"' 'if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" "send-keys -M" "copy-mode -e"'
bind-key -n WheelDownPane if-shell -F '#{&&:#{==:#{@web-terminal-command},codex},#{==:#{@web-terminal-codex-transcript},1}}' 'select-pane; send-keys PageDown'
bind-key -n C-t if-shell -F '#{==:#{@web-terminal-command},codex}' 'if-shell -F "#{==:#{@web-terminal-codex-transcript},1}" "set-option -pu @web-terminal-codex-transcript" "set-option -p @web-terminal-codex-transcript 1"; send-keys C-t' 'send-keys C-t'
bind-key -n Enter if-shell -F '#{==:#{@web-terminal-command},codex}' 'if-shell -F "#{&&:#{==:#{@web-terminal-codex-transcript},1},#{alternate_on}}" "send-keys Enter" "set-option -p @web-terminal-codex-transcript 0; send-keys Enter"' 'send-keys Enter'
bind-key -n q if-shell -F '#{==:#{@web-terminal-command},codex}' 'set-option -pu @web-terminal-codex-transcript; send-keys q' 'send-keys q'
bind-key -n Escape if-shell -F '#{==:#{@web-terminal-command},codex}' 'set-option -pu @web-terminal-codex-transcript; send-keys Escape' 'send-keys Escape'
bind-key -n C-c if-shell -F '#{==:#{@web-terminal-command},codex}' 'set-option -pu @web-terminal-codex-transcript; send-keys C-c' 'send-keys C-c'
